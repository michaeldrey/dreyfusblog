name: Regenerate tina-lock.json

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

jobs:
  regenerate-tina-lock:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if TinaCMS packages changed
        id: check
        run: |
          if git diff origin/main -- package.json | grep -qE '"(@tinacms/|tinacms)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: npm install

      - name: Regenerate tina-lock.json
        if: steps.check.outputs.changed == 'true'
        run: npx tinacms build
        env:
          TINACLIENTID: ${{ secrets.TINACLIENTID }}
          TINATOKEN: ${{ secrets.TINATOKEN }}

      - name: Commit tina-lock.json if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tina/tina-lock.json
          git diff --cached --quiet || git commit -m "Regenerate tina-lock.json"
          git push
